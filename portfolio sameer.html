<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid #333;
}

.profile-pic {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: url('my pp photo.jpg') no-repeat center/cover;
    margin-right: 20px;
}

.profile-info h2 {
    margin: 0;
}

.stats {
    display: flex;
    gap: 20px;
    margin-top: 10px;
}

.stats div {
    text-align: center;
}

/* Bio */
.bio {
    padding: 0 20px 20px;
}

/* Buttons */
.buttons {
    display: flex;
    gap: 10px;
    padding: 0 20px 20px;
}

button {
    flex: 1;
    padding: 8px;
    border: none;
    background: #262626;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
}

.grid img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* Footer */
.footer {
    text-align: center;
    padding: 10px;
    border-top: 1px solid #333;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- Profile Section -->
<div class="header">
    <div class="profile-pic"></div>

    <div class="profile-info">
        <h2>the_young_master_sameer07</h2>
        <div class="stats">
            <div><b>378</b><br>Posts</div>
            <div><b>1.5k</b><br>Followers</div>
            <div><b>846</b><br>Following</div>
        </div>
    </div>
</div>

<!-- Bio -->
<div class="bio">
    <p><b>Sameer Chaudhary</b></p>
    <p>Digital Creator | Lifestyle | Student minivlogs💪</p>
</div>

<!-- Buttons -->
<div class="buttons">
    <button>Edit Profile</button>
    <button>Contact</button>
</div>

<!-- Posts Grid -->
<div class="grid">
    <img src="WhatsApp Image 2026-04-23 at 11.24.18 AM.jpeg">
    <img src="WhatsApp Image 2026-04-23 at 11.24.18 AM 2.jpeg">
    <img src="WhatsApp Image 2026-04-23 at 11.24.18 AM 3.jpeg">
    <img src="WhatsApp Image 2026-04-23 at 11.24.19 AM.jpeg">
    <img src="WhatsApp Image 2026-04-23 at 11.24.19 AM 5.jpeg">
    <img src="WhatsApp Image 2026-04-23 at 11.24.19 AM 6.jpeg">
</div>

<div class="footer">
    © 2026 Sameer Portfolio
</div>

</body>
</html>
